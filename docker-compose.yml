services:
  api:
    build: ./backend
    container_name: yaoyaoweiba-api
    ports:
      - "4000:4000"
    environment:
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-yaoyaoweiba123}
      # 生产务必改为浏览器访问前台的完整 Origin，如 https://子域.你的域名.com（可逗号分隔多个）
      FRONTEND_URL: ${FRONTEND_URL:-http://127.0.0.1:3000}
      NODE_ENV: production
      DATA_DIR: /app/data
    volumes:
      - api_data:/app/data

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # 留空：前端请求 /api，由 Next rewrites 转到 BACKEND_URL_FOR_PROXY
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
        BACKEND_URL_FOR_PROXY: http://api:4000
        NEXT_PUBLIC_ADMIN_PASSWORD: ${ADMIN_PASSWORD:-yaoyaoweiba123}
        NEXT_PUBLIC_BUILD_TAG: ${NEXT_PUBLIC_BUILD_TAG:-unknown}
    container_name: yaoyaoweiba-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
      NEXT_PUBLIC_ADMIN_PASSWORD: ${ADMIN_PASSWORD:-yaoyaoweiba123}
      API_INTERNAL_URL: http://api:4000
      BACKEND_URL_FOR_PROXY: http://api:4000
    depends_on:
      - api

  # GitHub Webhook 自动部署（方案二）：需 .env.webhook、根目录 .env 中 COMPOSE_PROFILES=webhook
  # 启动：docker compose --profile webhook up -d github-webhook
  # 监听默认映射到宿主机 127.0.0.1:8787，由 Nginx HTTPS 反代；挂载 docker.sock 等同宿主机 root 操作 Docker，请谨慎。
  github-webhook:
    profiles:
      - webhook
    build:
      context: .
      dockerfile: scripts/github-webhook/Dockerfile
    container_name: yaoyaoweiba-github-webhook
    restart: unless-stopped
    ports:
      - "${GITHUB_WEBHOOK_BIND:-127.0.0.1}:8787:8787"
    env_file:
      - .env.webhook
    environment:
      WEBHOOK_REPO_ROOT: /repo
      GITHUB_WEBHOOK_HOST: 0.0.0.0
      GITHUB_WEBHOOK_PORT: "8787"
    volumes:
      - .:/repo:rw
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /repo

volumes:
  api_data:
